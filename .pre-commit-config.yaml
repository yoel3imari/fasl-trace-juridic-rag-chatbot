fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: >
          (?x)^(
              pnpm-lock\.yaml
          )$
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-lint
        name: Run ESLint on frontend
        entry: sh -c 'cd frontend && pnpm run lint'
        language: system
        types: [file]
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true
      - id: generate-openapi-schema
        name: Generate OpenAPI schema
        entry: sh -c 'cd backend && uv run python -m commands.generate_openapi_schema'
        language: system
        files: (main\.py$|schemas/.*\.py$|pyproject\.toml)
        pass_filenames: false
      - id: generate-frontend-client
        name: Generate frontend client
        entry: sh -c 'cd frontend && pnpm run generate-client'
        language: system
        files: ^local-shared-data/openapi\.json$
        pass_filenames: false
