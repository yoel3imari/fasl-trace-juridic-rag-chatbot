# =========================================================================
# precise-rag — Docker Compose (Development)
# =========================================================================
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
#   docker compose logs -f
# =========================================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: precise-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: precise_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - precise-rag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d precise_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: precise-rag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/precise_rag
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    networks:
      - precise-rag-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: precise-rag-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    networks:
      - precise-rag-net
    depends_on:
      - backend

# ── Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  backend_venv:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────
networks:
  precise-rag-net:
    driver: bridge
