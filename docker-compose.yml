# =========================================================================
# legal-rag — Docker Compose (Development)
# =========================================================================
# Hot-reload enabled. Source code mounted as volumes — edits reflect
# immediately in the containers (uvicorn --reload + Next.js HMR).
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
#   docker compose logs -f
# =========================================================================

services:
  # ── Milvus Vector Database ──────────────────────────────────────────
  etcd:
    container_name: legal-rag-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - legal-rag-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: legal-rag-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - legal-rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: legal-rag-milvus
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - legal-rag-net
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: legal-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: legal_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - legal-rag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legal_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend (dev — hot reload) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: legal-rag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/legal_rag
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:password@db_test:5432/test_legal_rag
      OPENAPI_OUTPUT_FILE: ./shared-data/openapi.json
    volumes:
      # Mount source code for hot-reload
      - ./backend:/app
      # Persist .venv across restarts (avoid re-installing)
      - backend_venv:/app/.venv
      # Shared directory for OpenAPI schema exchange
      - ./local-shared-data:/app/shared-data
      # Persist downloaded GGUF embedding model (CrispEmbed) across restarts
      - hf_cache:/app/cache/huggingface
    networks:
      - legal-rag-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js Frontend (dev — HMR) ────────────────────────────────────────
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.dev
  #   container_name: legal-rag-web
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000
  #     OPENAPI_OUTPUT_FILE: ./shared-data/openapi.json
  #   volumes:
  #     # Mount source code for HMR
  #     - ./frontend:/app
  #     # Persist node_modules across restarts
  #     - frontend_node_modules:/app/node_modules
  #     # Persist .next build cache for faster dev reboots
  #     - frontend_next:/app/.next
  #     # Shared directory for OpenAPI schema exchange
  #     - ./local-shared-data:/app/shared-data
  #   networks:
  #     - legal-rag-net
  #   depends_on:
  #     - backend

  # ── Test Database ──────────────────────────────────────────────────────
  db_test:
    image: postgres:16-alpine
    container_name: legal-rag-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_legal_rag
    ports:
      - "5433:5432"
    networks:
      - legal-rag-net

  # ── MailHog (dev email) ────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog
    container_name: legal-rag-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - legal-rag-net

# ── Volumes ─────────────────────────────────────────────────────────────
volumes:
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local
  postgres_data:
    driver: local
  backend_venv:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local
  hf_cache:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────
networks:
  legal-rag-net:
    driver: bridge
